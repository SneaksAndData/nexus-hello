dynaconf_merge = true

# Name of this algorithm in the Nexus deployment
algorithm_name = "hello-world"

# Result processing and serialization
[result]

# Base path to use when recording results. Protocol must be supported by storage_client_class
output_path = "s3a://e2e/nexus-sdk-tests/result"

# Storage client to use when saving serialized result and generating pre-signed URL for it
storage_client_class = "adapta.storage.blob.s3_storage_client.S3StorageClient"

# RESULT SERIALIZERS - classes available to serialize AlgorithmResult objects to desired formats
serializers = [
    "adapta.storage.models.formatters.PandasDataFrameJsonSerializationFormat"
]

# Run telemetry recording
[telemetry]
# Base path to use when recording input and user telemetry
output_path = "s3a://e2e/nexus-sdk-tests/telemetry"

# TELEMETRY SERIALIZERS - classes available to serialize Algorithm inputs and UserTelemetry classes
serializers = [
    "adapta.storage.models.formatters.PandasDataFrameJsonSerializationFormat"
]

# Input telemetry configurations. Inputs are dataframes and other objects passed to algorithm class from processors
[telemetry.input]
# Control whether algorithm inputs are recorded as telemetry
enabled = "1"

# User telemetry configurations. User telemetry comes from custom classes provided by algorithm developers that extend UserTelemetry interface
# User telemetry is often used for measure health, output quality and other data that is important for observing the runs in a live system
[telemetry.user]
# Control whether user telemetry recording is enabled
enabled = "1"

# Provide a list of user telemetry classes to execute. If empty, all user telemetry will be recorded
# THIS IS A RESERVATION FOR https://github.com/SneaksAndData/nexus-sdk-py/issues/126
classes = []

# INPUTS - configuration for data read interfaces
[inputs]

# External data sockets to be injected into InputReader instances
#[[inputs.sockets]]
#alias = "localfile1"
#data_path = "local+file:///tmp/file1.json"
#data_format = "text"
#
#[[inputs.sockets]]
#alias = "localfile2"
#data_path = "local+file:///tmp/file2.json"
#data_format = "text"

# default is empty list
sockets = []

# Query Enabled Store configuration
[inputs.query_enabled_store]

enabled = "0"

# Connection string for QES
connection_string = ""

# Settings for AstraClientModule
[inputs.astra_client]

# Enabled injection of AstraClientModule
enabled = "0"

# Framework-powered logging
[logging]
# Global template to apply to ALL log messages emitted by framework loggers. This setting conflicts with
# with_log_enricher() and might be removed in the future
fixed_template = ""

# Delimiter to use for global template
fixed_template_delimiter = ""

# Framework log level. Defaults to INFO if not provided
# log_level = "ERROR"

# Datadog API handler settings
[logging.datadog]
# If enabled, remember to add PROTEUS__DD_API_KEY, PROTEUS__DD_APP_KEY and PROTEUS__DD_SITE to your environment
# variables
enabled = "0"
buffer_size = "1"
debug = "False"
max_flush_retry_time = "30"
ignore_flush_failure = "True"
fixed_tags = {}
attach_interrupt_handlers = "True"

[metrics]
# Implementation of MetricsProvider used to submit default framework runtime and user-level metrics
provider = "adapta.metrics.providers.void_provider.VoidMetricsProvider"

# Initialization configuration for the MetricsProvider defined under `provider`
init_args = {"metric_namespace" = "sdk"}
